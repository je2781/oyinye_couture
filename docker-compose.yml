
services:
  admin:
    image: je278/oyinye-admin:1.6
    restart: always
    build:
      context: .
      target: development
      dockerfile: ./apps/admin/Dockerfile
    volumes:
      - /app/node_modules
    ports:
      - 3001:3000
    env_file: ./apps/admin/.env
    environment:
      NODE_ENV: ${NODE_ENV}
      DOMAIN: ${DOMAIN}
      USER: ${USER}
      PASS: ${PASS}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      DB_HOST: ${DB_HOST}
      NEXT_PUBLIC_DOMAIN: ${NEXT_PUBLIC_DOMAIN}
      IPINFO_TOKEN: ${IPINFO_TOKEN}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      QSTASH_URL: ${QSTASH_URL}
      QSTASH_TOKEN: ${QSTASH_TOKEN}
      NEXT_PUBLIC_QSTASH_TOKEN: ${NEXT_PUBLIC_QSTASH_TOKEN}
      QSTASH_CURRENT_SIGNING_KEY: ${QSTASH_CURRENT_SIGNING_KEY}
      QSTASH_NEXT_SIGNING_KEY: ${QSTASH_NEXT_SIGNING_KEY}
      NEXT_PUBLIC_QSTASH_INTERNAL_KEY: ${NEXT_PUBLIC_QSTASH_INTERNAL_KEY}
      QSTASH_INTERNAL_KEY: ${QSTASH_INTERNAL_KEY}
    depends_on:
      - admin_db
  web:
    image: je278/oyinye-web:1.6
    restart: always
    build:
      context: .
      target: development
      dockerfile: ./apps/web/Dockerfile
    ports:
       - 3000:3000
    volumes:
      - /app/
      - ./src/db/docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
    env_file: ./apps/web/.env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
      DOMAIN: ${DOMAIN}
      USER: ${USER}
      PASS: ${PASS}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      DB_HOST: ${DB_HOST}
      NEXT_PUBLIC_DOMAIN: ${NEXT_PUBLIC_DOMAIN}
      IPINFO_TOKEN: ${IPINFO_TOKEN}
      NEXT_PUBLIC_MER_CODE: ${NEXT_PUBLIC_MER_CODE}
      NEXT_PUBLIC_PAY_ITEM_ID: ${NEXT_PUBLIC_PAY_ITEM_ID}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      QSTASH_URL: ${QSTASH_URL}
      QSTASH_TOKEN: ${QSTASH_TOKEN}
      NEXT_PUBLIC_QSTASH_TOKEN: ${NEXT_PUBLIC_QSTASH_TOKEN}
      QSTASH_CURRENT_SIGNING_KEY: ${QSTASH_CURRENT_SIGNING_KEY}
      QSTASH_NEXT_SIGNING_KEY: ${QSTASH_NEXT_SIGNING_KEY}
      NEXT_PUBLIC_QSTASH_INTERNAL_KEY: ${NEXT_PUBLIC_QSTASH_INTERNAL_KEY}
      QSTASH_INTERNAL_KEY: ${QSTASH_INTERNAL_KEY}
    depends_on:
      - web_db
  admin_db:
    image: postgres
    ports:
      - ${DB_PORT}:5432
    container_name: postgres
    restart: always
    env_file: ./apps/admin/.env
    volumes:
      - admin_db_data:/var/lib/postgresql/data/
      # - ./src/ssl/certs/:/certs/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${DB_PORT} -U ${USER} -d ${DB_NAME}"]
      start_period: 0s
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: ${PASS}
      POSTGRES_DB: ${DB_NAME}
      # Enable SSL
      # POSTGRES_SSL_CERT: /certs/server.crt
      # POSTGRES_SSL_KEY: /certs/server.key
      # POSTGRES_SSL_CA: /certs/root.crt
  web_db:
    image: postgres
    ports:
      - ${DB_PORT}:5432
    container_name: postgres
    restart: always
    env_file: ./apps/web/.env
    volumes:
      - web_db_data:/var/lib/postgresql/data/
      - ./src/db/docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
      # - ./src/ssl/certs/:/certs/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${DB_PORT} -U ${USER} -d ${DB_NAME}"]
      start_period: 0s
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: ${PASS}
      POSTGRES_DB: ${DB_NAME}
      # Enable SSL
      # POSTGRES_SSL_CERT: /certs/server.crt
      # POSTGRES_SSL_KEY: /certs/server.key
      # POSTGRES_SSL_CA: /certs/root.crt

volumes:
  admin_db_data:
  web_db_data:




